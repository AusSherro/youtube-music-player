<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTP Mini Player</title>
  <link rel="stylesheet" href="./styles/mini-player.css">
</head>
<body>
  <div id="mini-player">
    <div class="mini-drag">
      <div class="mini-controls">
        <button class="mini-ctrl-btn" id="btn-expand" aria-label="Expand" title="Expand to full window">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M 2 7 L 5 3 L 8 7"/>
          </svg>
        </button>
        <button class="mini-ctrl-btn mini-ctrl-btn-close" id="btn-close" aria-label="Close" title="Close">
          <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M 0 0 L 10 10 M 10 0 L 0 10"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="mini-content">
      <img id="album-art" alt="Album art" referrerpolicy="no-referrer" />
      <div class="track-info">
        <div id="track-title">Not playing</div>
        <div id="track-artist"></div>
      </div>
      <div class="playback-controls">
        <button class="playback-btn" id="btn-prev" aria-label="Previous" title="Previous">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <rect x="1" y="2" width="2" height="10"/>
            <path d="M 13 2 L 5 7 L 13 12 Z"/>
          </svg>
        </button>
        <button class="playback-btn" id="btn-play" aria-label="Play" title="Play">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <path d="M 3 1 L 12 7 L 3 13 Z"/>
          </svg>
        </button>
        <button class="playback-btn" id="btn-next" aria-label="Next" title="Next">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <rect x="11" y="2" width="2" height="10"/>
            <path d="M 1 2 L 9 7 L 1 12 Z"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="progress-container">
      <div id="progress-fill"></div>
    </div>
    <div id="nav-away" class="hidden">Not on YouTube Music</div>
  </div>
  <script type="module" src="./mini-player.ts"></script>
</body>
</html>
